# Pre-commit hooks for FortKnoxx.
#
# WHY: Catch hygiene, formatting, and secret leaks at commit time so CI
# never has to. Aligned with CLAUDE.md §15 (CI/CD) and §13 (Security).
#
# Setup:  pip install pre-commit && pre-commit install
# Run:    pre-commit run --all-files

repos:
  # ---- Generic hygiene ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ---- Python: lint + format ----
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ---- Python: type checking ----
  # Initially lenient — set strict per-module as we extract from server.py.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/
        additional_dependencies:
          - "pydantic>=2.0"
          - "types-requests"
        args:
          - "--ignore-missing-imports"
          - "--no-strict-optional"
          - "--explicit-package-bases"

  # ---- JS/TS: lint + format ----
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/src/.*\.(js|jsx|ts|tsx|css|json|md)$
        exclude: ^frontend/build/

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.15.0
    hooks:
      - id: eslint
        files: ^frontend/src/.*\.(js|jsx)$
        exclude: ^frontend/build/
        additional_dependencies:
          - "eslint@9.15.0"

  # ---- Secret scanning ----
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ---- Shell scripts ----
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
