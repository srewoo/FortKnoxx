# Alembic config for FortKnoxx Postgres migrations.
#
# Run from backend/:
#   alembic -c db_client/alembic.ini upgrade head
#   alembic -c db_client/alembic.ini revision --autogenerate -m "what changed"
#
# Connection string is read from the POSTGRES_DSN env var via env.py
# (we deliberately do NOT hard-code it here so prod / dev / test stay
# separated by environment).

[alembic]
script_location = alembic
prepend_sys_path = ../

# We rely on `sqlalchemy.url` being set programmatically in env.py.
sqlalchemy.url =

# File template for new migrations
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
