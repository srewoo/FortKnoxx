          description: Access token for private repos (optional for public repos)
        is_public:
          type: boolean
          title: Is Public
          description: Whether this is a public repository (no token required)
          default: false
      type: object
      required:
      - provider
      - repo_url
      title: AddRepositoryRequest
      description: Request model for adding a repository to scan
      example:
        auto_scan: true
        branch: main
        is_public: true
        provider: github
        repo_url: https://github.com/myorg/myrepo
