          description: Enable ML-based zero-day detection
          default: true
        enable_business_logic_scanner:
          type: boolean
          title: Enable Business Logic Scanner
          description: Enable business logic flaw detection
          default: true
        enable_llm_security_scanner:
          type: boolean
          title: Enable Llm Security Scanner
          description: Enable LLM prompt injection testing
          default: true
        enable_auth_scanner:
          type: boolean
          title: Enable Auth Scanner
          description: Enable authentication vulnerability scanner
          default: true
      type: object
      title: AIScannerSettings
      description: 'DEPRECATED: Use ScannerSettings instead. Kept for backwards compatibility.'
      example:
        enable_auth_scanner: false
        enable_business_logic_scanner: true
        enable_llm_security_scanner: true
        enable_zero_day_detector: true
    AddRepositoryRequest:
      properties:
        provider:
          $ref: '#/components/schemas/GitProvider'
