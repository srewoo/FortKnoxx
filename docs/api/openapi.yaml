  /api/model/check-update:
    post:
      summary: Check Model Update
      description: 'Manually trigger a model update check


        This will:

        1. Check the configured update source for new versions

        2. Download and install if a newer version is available

        3. Validate the new model before activation

        4. Automatically rollback if validation fails'
      operationId: check_model_update_api_model_check_update_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/model/feedback:
    post:
      summary: Submit Model Feedback
      description: 'Submit feedback on model detection results


        This feedback is used to improve future model versions.

        It does NOT trigger immediate retraining.


        - **file_path**: Path of the analyzed file

        - **detected_vulns**: Vulnerabilities the model detected

        - **confirmed_vulns**: Which detections were correct (true positives)

        - **false_positives**: Which detections were wrong

        - **missed_vulns**: Vulnerabilities the model should have found'
      operationId: submit_model_feedback_api_model_feedback_post
      parameters:
      - name: file_path
        in: query
        required: true
        schema:
          type: string
          title: File Path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Body_submit_model_feedback_api_model_feedback_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
