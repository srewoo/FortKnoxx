          type: string
          title: Repo Url
          description: Repository URL (e.g., https://github.com/owner/repo)
        auto_scan:
          type: boolean
          title: Auto Scan
          description: Enable auto-scan on push
          default: false
        branch:
          anyOf:
          - type: string
          - type: 'null'
          title: Branch
          description: Branch to scan (defaults to default branch)
        access_token:
          anyOf:
          - type: string
          - type: 'null'
