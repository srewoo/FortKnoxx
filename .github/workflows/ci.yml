# Backend CI for FortKnoxx.
#
# WHY: locks in the linting, typing, test, and contract-drift gates
# established in Phase 0 / 1. Every PR has to pass these before merge.
# When Phase 7 deploys land, this file gains build/push/deploy stages.

name: backend-ci

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docs/api/**"
      - ".github/workflows/ci.yml"
      - ".pre-commit-config.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: lint + type + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install base dependencies
        # NumPy < 2 first — scipy/sklearn pinned wheels were built
        # against NumPy 1.x; NumPy 2 raises `_ARRAY_API not found`.
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2"
          pip install -r requirements-base.txt

      - name: Ruff (lint + format check)
        run: |
          pip install ruff==0.7.4
          ruff check .
          ruff format --check .

      - name: Mypy (lenient — see pyproject.toml)
        run: |
          pip install "mypy>=1.13" "types-requests" "pydantic>=2.0"
          mypy --config-file pyproject.toml api services llm db_client

      - name: Pytest (unit + API smoke)
        run: |
          pytest \
            tests/test_model_registry.py \
            tests/test_result_safety.py \
            tests/test_schemas.py \
            tests/test_scoring.py \
            tests/api/ \
            tests/db_client/ \
            -q \
            --maxfail=1

      - name: OpenAPI contract is up to date
        # Fails the build if the generated schema drifts from the
        # checked-in `docs/api/openapi.yaml`. Run
        # `python backend/scripts/export_openapi.py` and commit the
        # result to fix.
        run: |
          python scripts/export_openapi.py --check

  pre-commit:
    name: pre-commit (full repo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pre-commit
        run: pip install pre-commit==4.0.1
      - name: Run hooks
        run: pre-commit run --all-files --show-diff-on-failure

  frontend:
    name: frontend lint + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Lint
        # CRA-craco does not bring its own root lint command; this is a
        # smoke check until the FE is migrated to a Vite/Next stack.
        run: |
          if yarn run | grep -q "lint"; then
            yarn lint
          else
            echo "no lint script defined; skipping"
          fi
      - name: Build
        env:
          # Build is just a smoke test — no real backend URL needed.
          REACT_APP_BACKEND_URL: http://localhost:8000
        run: yarn build
